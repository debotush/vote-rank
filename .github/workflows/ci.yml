name: CI

on:
  push:
    branches: [ master, main ]
  pull_request:
    branches: [ master, main ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.23'

      - name: Verify dependencies
        run: go mod verify

      - name: Static analysis (vet)
        run: go vet ./...

      - name: Install staticcheck
        run: go install honnef.co/go/tools/cmd/staticcheck@latest

      - name: Run staticcheck
        run: staticcheck ./...

      - name: Run tests
        run: go test -v -race ./...

      - name: Build binary
        run: go build -o vote-rank ./...

  release:
    runs-on: ubuntu-latest
    needs: build-and-test
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.23'

      - name: Build release binaries
        run: |
          GOOS=linux   GOARCH=amd64 go build -o vote-rank-linux-amd64 .
          GOOS=windows GOARCH=amd64 go build -o vote-rank-windows-amd64.exe .
          GOOS=darwin  GOARCH=amd64 go build -o vote-rank-darwin-amd64 .

      - name: Upload release artifacts
        uses: softprops/action-gh-release@v2
        with:
          files: |
            vote-rank-linux-amd64
            vote-rank-windows-amd64.exe
            vote-rank-darwin-amd64
